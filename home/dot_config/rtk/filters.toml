# User-global RTK filters — apply to all your projects.
# Project-local .rtk/filters.toml takes precedence over these.
# Keep these conservative: trim wrapper noise, not command semantics.
schema_version = 1

[filters.mise-run]
description = "Drop repetitive start/done lines from mise task wrappers."
match_command = "^mise\\s+run\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\[[^]]+\\] start: ",
  "^\\[[^]]+\\] done: ",
]
max_lines = 120

[filters.pre-commit]
description = "Hide all-green pre-commit hook lines while keeping failures visible."
match_command = "^pre-commit\\s+run\\b"
strip_ansi = true
strip_lines_matching = [
  "^.+\\.{5,}Passed$",
]
max_lines = 80

[settings]
idiomatic_version_file_enable_tools = ["node", "python", "ruby"]

# Tool-specific mirrors.
node.mirror_url = "https://npmmirror.com/mirrors/node/"
go.download_mirror = "https://golang.google.cn/dl"

# Generic download URL rewrites. Keep this conservative: broad GitHub
# replacements can break checksums, API calls, or authenticated downloads.
[settings.url_replacements]
"https://nodejs.org/dist" = "https://npmmirror.com/mirrors/node"
"https://dl.google.com/go" = "https://golang.google.cn/dl"

# Workstation-global tools. Keep always-available CLIs here, including tools
# used across other repositories that should be preinstalled on the machine.
[tools]
bottom = "latest"
direnv = "latest"
dprint = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
go = "latest"
hurl = "latest"
java = "zulu-21"
jj = "latest"
jq = "latest"
kubectl = "latest"
maven = "latest"
node = "lts"
pnpm = "latest"
pre-commit = "latest"
python = "latest"
ripgrep = "latest"
rtk = "latest"
ruff = "latest"
shellcheck = "latest"
shfmt = "latest"
terraform = "latest"
tokei = "latest"
tree-sitter = "latest"
typst = "latest"
usage = "latest"
uv = "latest"
wrangler = "latest"
yq = "latest"
zoxide = "latest"

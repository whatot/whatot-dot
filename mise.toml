[tools]
bottom = "latest"
direnv = "latest"
dprint = "latest"
fd = "latest"
fzf = "latest"
go = "latest"
hurl = "latest"
java = "zulu-21"
jj = "latest"
jq = "latest"
kubectl = "latest"
maven = "latest"
node = "lts"
pnpm = "latest"
pre-commit = "latest"
python = "latest"
ripgrep = "latest"
rtk = "latest"
ruff = "latest"
shellcheck = "latest"
shfmt = "latest"
terraform = "latest"
tree-sitter = "latest"
typst = "latest"
tokei = "latest"
usage = "latest"
uv = "latest"
wrangler = "latest"
yq = "latest"
zoxide = "latest"

[tasks.bootstrap]
description = "Install minimum host dependencies and apply the workstation config"
hide = true
run = "scripts/bootstrap"

[tasks.setup]
description = "Set up the current host"
run = "scripts/setup"

[tasks.check]
description = "Run local checks before committing"
run = [
  "tests/check",
  { task = "chezmoi:diff" },
  { task = "hooks:run" },
  { task = "doctor" },
]

[tasks.show]
description = "Show active host, environment readiness, and pending dotfile changes"
run = "scripts/show"

[tasks.outdated]
description = "Refresh metadata and show available package and mise updates"
run = "scripts/outdated"

[tasks."outdated:packages"]
description = "Refresh metadata and show available operating system package updates"
run = "scripts/outdated packages"

[tasks."outdated:mise"]
description = "Refresh metadata and show available mise tool updates"
run = "scripts/outdated mise"

[tasks."show:host"]
description = "Show active dotfiles host and resolved actions"
run = "scripts/host show"

[tasks."show:dotfiles"]
description = "Preview chezmoi-managed dotfile changes"
run = "scripts/chezmoi diff"

[tasks."show:cheat"]
description = "Print the shell and dotfiles cheat sheet"
run = "scripts/cheat"

[tasks."chezmoi:apply"]
description = "Run the raw chezmoi apply command"
run = "scripts/chezmoi apply"

[tasks.preflight]
description = "Check required private settings"
hide = true
run = "scripts/preflight"

[tasks.doctor]
description = "Diagnose environment readiness before setup or updates"
run = "scripts/doctor"

[tasks."chezmoi:diff"]
description = "Preview chezmoi-managed dotfile changes"
run = "scripts/chezmoi diff"

[tasks."hooks:install"]
description = "Install git pre-commit hooks"
run = "pre-commit install"

[tasks."hooks:run"]
description = "Run pre-commit hooks on all files"
hide = true
run = "pre-commit run --all-files"

[tasks.update]
description = "Update packages, mise tools, and chezmoi state"
run = "scripts/update"

[tasks."update:packages"]
description = "Update operating system packages for the current host"
run = "scripts/update packages"

[tasks."update:mise"]
description = "Update mise and install declared tool versions"
run = "scripts/update mise"

[tasks."update:dotfiles"]
description = "Equivalent to chezmoi:apply"
run = "scripts/update dotfiles"

[tasks."devtools:rust-system"]
description = "Install system packages commonly needed by Rust builds"
run = "scripts/devtools rust-system"

[tasks."devtools:rust-toolchain"]
description = "Ensure the default Rust toolchain is installed"
run = "scripts/devtools rust-toolchain"

[tasks."devtools:rust-tools"]
description = "Install Rust CLI development tools"
run = "scripts/devtools rust-tools"

[tasks."devtools:rust-tools-extra"]
description = "Install heavier Rust CLI development tools"
run = "scripts/devtools rust-tools-extra"

[tasks."devtools:go-tools"]
description = "Install Go CLI development tools"
run = "scripts/devtools go-tools"

[tasks."tools:create-iso"]
description = "Convert a macOS Disk Utility dmg into iso and checksum"
run = "scripts/create-iso"

[tasks."tools:mvn-cleanup"]
description = "Run offline mvn clean for child Maven projects"
run = "scripts/mvn-cleanup"

[tasks."tools:git-upgrade"]
description = "Update child git or hg repositories"
run = "scripts/git-upgrade"
